{% extends "base.html" %}
{% block title %}Register Station — Plug and Go{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 py-8">
  <div class="bg-card rounded-2xl shadow-glow border border-gray-100 p-8">
    <div class="mb-8">
      <h1 class="text-3xl font-bold text-textdark">Register Your Station</h1>
      <p class="text-textmuted mt-2">Add your charging station to our network in Kasaragod and beyond.</p>
    </div>

    <form method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-8">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      
      <div class="space-y-6">
        <div>
          <label class="block text-sm font-semibold text-textdark mb-2">Station Name</label>
          <input type="text" name="name" required placeholder="e.g. Green Charge Kasaragod" 
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary outline-none transition" />
        </div>

        <div>
          <label class="block text-sm font-semibold text-textdark mb-2">Address / Location</label>
          <input type="text" name="location" required placeholder="e.g. Nullipady, Kasaragod" 
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary outline-none transition" />
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold text-textdark mb-2">Latitude</label>
            <input type="number" step="any" name="latitude" id="lat" required readonly
                   class="w-full border border-gray-200 bg-gray-50 rounded-xl px-4 py-3 text-textmuted cursor-not-allowed" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-textdark mb-2">Longitude</label>
            <input type="number" step="any" name="longitude" id="lng" required readonly
                   class="w-full border border-gray-200 bg-gray-50 rounded-xl px-4 py-3 text-textmuted cursor-not-allowed" />
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold text-textdark mb-2">Charger Types (Comma separated)</label>
          <input type="text" name="charger_types" required placeholder="e.g. CCS, Type 2, DC Fast Charging" 
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary outline-none transition" />
        </div>

        <div>
          <label class="block text-sm font-semibold text-textdark mb-2">Total Charging Slots</label>
          <input type="number" name="total_slots" required min="1" max="50" value="2"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary outline-none transition" />
        </div>

        <button type="submit" class="w-full bg-primary hover:bg-darkgreen text-white font-bold py-4 rounded-xl shadow-lg transition transform hover:-translate-y-0.5 active:translate-y-0 mt-4">
          Register Station ⚡
        </button>
      </div>

      <div class="space-y-4">
        <label class="block text-sm font-semibold text-textdark mb-2">Pin Your Location on Map</label>
        <div id="picker-map" class="h-[450px] rounded-2xl border border-gray-200 shadow-inner overflow-hidden"></div>
        <p class="text-xs text-textmuted italic">Click on the map to set your station's precise coordinates.</p>
      </div>
    </form>
  </div>
</div>

<style>
  #picker-map { position: relative; z-index: 10; }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    // Default to Kasaragod center
    var startLat = 12.4996;
    var startLng = 74.9869;

    var map = L.map('picker-map').setView([startLat, startLng], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    var marker;

    function updateCoords(lat, lng) {
      document.getElementById('lat').value = lat.toFixed(6);
      document.getElementById('lng').value = lng.toFixed(6);
      
      if (marker) {
        marker.setLatLng([lat, lng]);
      } else {
        marker = L.marker([lat, lng], {draggable: true}).addTo(map);
        marker.on('dragend', function(e) {
          var pos = marker.getLatLng();
          updateCoords(pos.lat, pos.lng);
        });
      }
    }

    map.on('click', function(e) {
      updateCoords(e.latlng.lat, e.latlng.lng);
    });

    // Handle initial optional set if fields pre-filled or user wants to start there
    map.on('locationfound', function(e) {
       updateCoords(e.latlng.lat, e.latlng.lng);
    });
  });
</script>
{% endblock %}

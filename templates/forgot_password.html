{% extends "base.html" %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
  <div class="bg-card rounded-2xl shadow-xl p-10 w-full max-w-md">
    <h1 class="text-3xl font-bold text-textdark mb-2">Forgot Password</h1>
    <p class="text-sm text-textmuted mb-6">Enter your email to receive a password reset link.</p>

    <form method="POST" class="grid gap-4">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

      <div>
        <label class="text-xs uppercase tracking-wide text-textmuted">Email</label>
        <input type="email" name="email" required class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-primary" />
      </div>

      <button type="submit" class="w-full bg-primary hover:bg-darkgreen text-white rounded-lg py-2.5 font-semibold shadow-sm">Send Reset Link</button>
    </form>

    <div class="mt-5 text-center text-sm text-textmuted">Back to <a href="/login" class="font-semibold text-primary hover:text-darkgreen">Login</a></div>
  </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block content %}
<div class="grid grid-cols-4 gap-6">
  <aside class="col-span-1 bg-card rounded-xl border border-gray-200 p-6 shadow-sm text-center">
    <div class="w-20 h-20 mx-auto bg-primary text-white rounded-full flex items-center justify-center text-3xl font-bold">{{ current_user.name[:1] }}</div>
    <h2 class="mt-3 font-semibold">{{ current_user.name }}</h2>
    <p class="text-textmuted text-sm">{{ current_user.email }}</p>
  </aside>

  <main class="col-span-3 bg-card rounded-xl border border-gray-200 p-6 shadow-sm">
    <h1 class="text-2xl font-bold mb-4">Edit Profile</h1>
    <form method="post" class="space-y-4">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="text-xs uppercase tracking-wide text-textmuted">Name</label>
          <input name="name" value="{{ current_user.name }}" required class="w-full border border-gray-300 rounded-lg px-3 py-2" />
        </div>
        <div>
          <label class="text-xs uppercase tracking-wide text-textmuted">Phone</label>
          <input name="phone" value="{{ current_user.phone }}" required class="w-full border border-gray-300 rounded-lg px-3 py-2" />
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="text-xs uppercase tracking-wide text-textmuted">Vehicle Type</label>
          <input name="vehicle_type" value="{{ user.vehicle_type }}" required class="w-full border border-gray-300 rounded-lg px-3 py-2" />
        </div>
        <div>
          <label class="text-xs uppercase tracking-wide text-textmuted">Vehicle Model</label>
          <input name="vehicle_model" value="{{ user.vehicle_model }}" required class="w-full border border-gray-300 rounded-lg px-3 py-2" />
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="text-xs uppercase tracking-wide text-textmuted">License Number</label>
          <input name="license_number" value="{{ user.license_number or '' }}" required class="w-full border border-gray-300 rounded-lg px-3 py-2" placeholder="e.g. DL-12345" />
        </div>
        <div>
          <label class="text-xs uppercase tracking-wide text-textmuted">Vehicle Number Plate</label>
          <input name="vehicle_number_plate" value="{{ user.vehicle_number_plate or '' }}" class="w-full border border-gray-300 rounded-lg px-3 py-2" placeholder="e.g. KL-14-AK-5678" />
        </div>
      </div>

      <button type="submit" class="bg-primary text-white px-6 py-2.5 rounded-lg font-semibold hover:bg-darkgreen">Save Changes</button>
    </form>
  </main>
</div>

<script>
document.querySelector("form").addEventListener("submit", function(e) {
    const license = document.querySelector("[name='license_number']").value.trim();
    const plate = document.querySelector("[name='vehicle_number_plate']").value.trim();

    if (!license) {
        alert("License number is required.");
        e.preventDefault();
        return;
    }

    if (plate && !/^[A-Za-z0-9-]+$/.test(plate)) {
        alert("Invalid vehicle number plate format (alphanumeric and dashes only).");
        e.preventDefault();
    }
});
</script>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>500 — Server Error | Plug and Go</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0f1f14;color:#f0fdf4;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .error-container{text-align:center;max-width:500px;width:100%;}
    .error-icon{font-size:80px;margin-bottom:24px;animation:shake 1s ease-in-out infinite;}
    @keyframes shake{0%,100%{transform:rotate(0deg);}25%{transform:rotate(-5deg);}75%{transform:rotate(5deg);}}
    .error-code{font-size:120px;font-weight:700;line-height:1;margin-bottom:8px;background:linear-gradient(135deg,#f87171,#dc2626);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .error-card{background:#122318;border:1px solid rgba(220,38,38,0.2);border-radius:20px;padding:40px 36px;box-shadow:0 8px 40px rgba(0,0,0,0.4);}
    .error-title{font-size:24px;font-weight:600;margin-bottom:12px;}
    .error-message{font-size:15px;color:#86efac;opacity:0.7;line-height:1.6;margin-bottom:32px;}
    .btn-home{display:inline-block;padding:13px 32px;background:#16a34a;color:#fff;border-radius:12px;font-size:15px;font-weight:600;text-decoration:none;transition:all .2s ease;margin:6px;box-shadow:0 4px 16px rgba(22,163,74,.35);} .btn-home:hover{background:#15803d;transform:translateY(-2px);}
    .logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:32px;}
    .logo-icon{width:40px;height:40px;background:#16a34a;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;}
    .logo-text{font-size:20px;font-weight:700;letter-spacing:1px;}
  </style>
</head>
<body>
  <div class="error-container">
    <div class="logo"><div class="logo-icon">⚡</div><span class="logo-text">Plug & Go</span></div>
    <div class="error-card">
      <div class="error-icon">⚠️</div>
      <div class="error-code">500</div>
      <h1 class="error-title">Server Error</h1>
      <p class="error-message">Something went wrong on our end. Our team is working on it. Please try again soon.</p>
      <a href="/" class="btn-home">🏠 Go Home</a>
      <a href="javascript:location.reload()" class="btn-home" style="background:#1e4d30;box-shadow:none;">🔄 Try Again</a>
    </div>
  </div>
</body>
</html>

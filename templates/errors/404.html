<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Plug and Go</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#0f1f14; color:#f0fdf4;
      font-family:'Inter', sans-serif;
      min-height:100vh; display:flex;
      align-items:center; justify-content:center;
      padding:20px;
    }
    .error-container { text-align:center; max-width:500px; width:100%; }
    .error-icon { font-size:80px; margin-bottom:24px; animation:bounce 2s ease-in-out infinite; }
    @keyframes bounce { 0%,100% {transform:translateY(0);} 50% {transform:translateY(-12px);} }
    .error-code { font-size:120px; font-weight:700; line-height:1; margin-bottom:8px;
      background:linear-gradient(135deg,#4ade80,#16a34a);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text; }
    .error-title { font-size:24px; font-weight:600; margin-bottom:12px; }
    .error-message { font-size:15px; color:#86efac; opacity:0.7; line-height:1.6; margin-bottom:36px; }
    .error-card { background:#122318; border:1px solid rgba(22,163,74,0.2); border-radius:20px;
      padding:40px 36px; box-shadow:0 8px 40px rgba(0,0,0,0.4); margin-bottom:28px; }
    .btn-home, .btn-back { display:inline-block; padding:13px 32px; border-radius:12px; font-size:15px; font-weight:600;
      text-decoration:none; transition:all 0.2s ease; margin:6px; font-family:'Inter',sans-serif; }
    .btn-home { background:#16a34a; color:#ffffff; border:none; box-shadow:0 4px 16px rgba(22,163,74,0.35); }
    .btn-home:hover { background:#15803d; transform:translateY(-2px); box-shadow:0 6px 20px rgba(22,163,74,0.45); }
    .btn-back { background:transparent; color:#4ade80; border:1px solid rgba(22,163,74,0.4); }
    .btn-back:hover { background:rgba(22,163,74,0.1); border-color:#16a34a; transform:translateY(-2px); }
    .logo { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:32px; }
    .logo-icon { width:40px; height:40px; background:#16a34a; border-radius:10px; display:flex; align-items:center; justify-content:center;
      font-size:20px; box-shadow:0 0 16px rgba(22,163,74,0.4); }
    .logo-text { font-size:20px; font-weight:700; color:#f0fdf4; letter-spacing:1px; }
    .suggestions { text-align:left; margin-top:20px; padding-top:20px; border-top:1px solid rgba(22,163,74,0.1); }
    .suggestions p { font-size:13px; color:#86efac; opacity:0.6; margin-bottom:10px; }
    .suggestions a { display:block; color:#4ade80; font-size:13px; text-decoration:none; padding:6px 0; transition:opacity 0.2s; }
    .suggestions a:hover { opacity:0.8; }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="logo"><div class="logo-icon">⚡</div><span class="logo-text">Plug & Go</span></div>
    <div class="error-card">
      <div class="error-icon">🔌</div>
      <div class="error-code">404</div>
      <h1 class="error-title">Page Not Found</h1>
      <p class="error-message">Oops! The page you're looking for doesn't exist or has been moved.</p>
      <div><a href="/" class="btn-home">🏠 Go Home</a><a href="javascript:history.back()" class="btn-back">← Go Back</a></div>
      <div class="suggestions">
        <p>You might be looking for:</p>
        <a href="/stations">⚡ Find Charging Stations</a>
        <a href="/dashboard">📊 My Dashboard</a>
        <a href="/my-bookings">📅 My Bookings</a>
        <a href="/login">🔑 Login</a>
      </div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>403 — Forbidden | Plug and Go</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0f1f14;color:#f0fdf4;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .error-container{text-align:center;max-width:500px;}
    .error-code{font-size:120px;font-weight:700;background:linear-gradient(135deg,#fbbf24,#d97706);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin:16px 0 8px;}
    .error-card{background:#122318;border:1px solid rgba(234,179,8,0.2);border-radius:20px;padding:40px 36px;box-shadow:0 8px 40px rgba(0,0,0,0.4);}
    .btn{display:inline-block;padding:13px 32px;background:#16a34a;color:#fff;border-radius:12px;font-size:15px;font-weight:600;text-decoration:none;margin:6px;transition:all .2s ease;}
    .btn:hover{background:#15803d;transform:translateY(-2px);}
    .logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:28px;}
    .logo-icon{width:40px;height:40px;background:#16a34a;border-radius:10px;display:grid;place-items:center;font-size:20px;}
    .logo-text{font-size:20px;font-weight:700;}
  </style>
</head>
<body>
  <div class="error-container">
    <div class="logo"><div class="logo-icon">⚡</div><span class="logo-text">Plug & Go</span></div>
    <div class="error-card">
      <div style="font-size:72px;margin-bottom:16px">🚫</div>
      <div class="error-code">403</div>
      <h1 style="font-size:24px;font-weight:600;margin:0 0 12px">Access Forbidden</h1>
      <p style="color:#86efac;opacity:.7;font-size:15px;line-height:1.6;margin-bottom:32px">You don't have permission to access this page. Contact administrator if this is unexpected.</p>
      <a href="/" class="btn">🏠 Go Home</a>
      <a href="/login" class="btn" style="background:#1e4d30">🔑 Login</a>
    </div>
  </div>
</body>
</html>
